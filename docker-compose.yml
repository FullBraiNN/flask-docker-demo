services:

flask:
  build: ./flask

  expose:
    - "5000"

  environment:
    DB_HOST: postgres
    DB_NAME: todo_db
    DB_USER: todo_user
    DB_PASSWORD: secret123

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: secret123

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
